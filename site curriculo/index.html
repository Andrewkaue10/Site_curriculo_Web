<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <div class="container mt-5 mb-5 p-4 rounded shadow bg-white">
        <div class="text-center mb-4">
            <img src="KAUE.jpg" alt="Foto de Perfil" class="rounded-circle profile-img" id="profileImg">
            <h2 class="mt-3">Andrew Kauê</h2>
            <p class="lead">Desenvolvedor Web | Estudante | Criador de Soluções | Gestor de projetos | Scrum Master</p>
            
            <div class="d-flex justify-content-center gap-2 mt-3 flex-wrap">
                <span class="badge bg-primary">HTML5</span>
                <span class="badge bg-primary">CSS3</span>
                <span class="badge bg-primary">JavaScript</span>
                <span class="badge bg-primary">React</span>
                <span class="badge bg-primary">Node.js</span>
                <span class="badge bg-primary">Scrum</span>
            </div>
        </div>

        <nav class="nav justify-content-center mb-4">
            <a class="nav-link active" href="identificacao.html" target="main" onclick="setActive(this)">
                <i class="fas fa-user me-2"></i>Identificação
            </a>
            <a class="nav-link" href="formacao.html" target="main" onclick="setActive(this)">
                <i class="fas fa-graduation-cap me-2"></i>Formação
            </a>
            <a class="nav-link" href="experiencia.html" target="main" onclick="setActive(this)">
                <i class="fas fa-briefcase me-2"></i>Experiência
            </a>
            <a class="nav-link" href="hobbies.html" target="main" onclick="setActive(this)">
                <i class="fas fa-heart me-2"></i>Hobbies
            </a>
            <a class="nav-link" href="softskills.html" target="main" onclick="setActive(this)">
                <i class="fas fa-lightbulb me-2"></i>Soft Skills
            </a>
            <a class="nav-link" href="formulário.html" target="main" onclick="setActive(this)">
                <i class="fas fa-envelope me-2"></i>Contato
            </a>
        </nav>

        <div class="position-relative">
            <div class="iframe-loading" id="iframeLoading" style="display: none;">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Carregando...</span>
                </div>
            </div>
            <iframe src="identificacao.html" width="100%" height="600px" name="main" id="mainFrame" class="border rounded"></iframe>
        </div>

        <footer class="text-center mt-4">
            <p class="mb-3"><i class="fas fa-share-alt me-2"></i>Redes Sociais</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="https://github.com/Andrewkaue10/Senac-ads039" target="_blank" title="GitHub">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg" width="40" alt="GitHub">
                </a>
                <a href="https://www.linkedin.com/in/andrew-kau%C3%AA-57380b2a8/" target="_blank" title="LinkedIn">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/linkedin/linkedin-original.svg" width="40" alt="LinkedIn">
                </a>
                <a href="https://www.instagram.com/andr_ewkaue14/" target="_blank" title="Instagram">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" width="40" alt="Instagram" style="border-radius: 10px;">
                </a>
            </div>
            
      
            <div class="row mt-4 pt-3 border-top">
                <div class="col-md-4">
                    <i class="fas fa-phone-alt text-primary"></i>
                    <p class="mb-0 mt-2">(81) 98811-5610</p>
                </div>
                <div class="col-md-4">
                    <i class="fas fa-envelope text-primary"></i>
                    <p class="mb-0 mt-2">andrewkaue13@gmail.com</p>
                </div>
                <div class="col-md-4">
                    <i class="fas fa-map-marker-alt text-primary"></i>
                    <p class="mb-0 mt-2">Recife, PE</p>
                </div>
            </div>
        </footer>
    </div>

    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('loading').classList.add('hide');
            }, 500);
        });

        function setActive(element) {
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
            });
            element.classList.add('active');
            
            showIframeLoading();
        }

        function showIframeLoading() {
            const iframe = document.getElementById('mainFrame');
            const loading = document.getElementById('iframeLoading');
            
            loading.style.display = 'flex';
            
            iframe.onload = function() {
                loading.style.display = 'none';
            };
        }

        document.addEventListener('DOMContentLoaded', function() {
            const iframe = document.getElementById('mainFrame');
            const links = document.querySelectorAll('.nav-link');
            
        
            iframe.onload = function() {
                const src = iframe.contentWindow.location.pathname.split('/').pop();
                links.forEach(link => {
                    const href = link.getAttribute('href');
                    if (href === src) {
                        link.classList.add('active');
                    }
                });
            };
        });

        document.getElementById('profileImg').addEventListener('mouseenter', function() {
            this.style.transform = 'scale(1.1) rotate(5deg)';
        });
        
        document.getElementById('profileImg').addEventListener('mouseleave', function() {
            this.style.transform = 'scale(1) rotate(0)';
        });

        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });

        console.log('Bem-vindo ao currículo de Andrew Kauê!');
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
